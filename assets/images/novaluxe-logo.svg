<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 60" width="380" height="60">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c9a265;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#d4af7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a265;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="starGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2c27d" />
      <stop offset="100%" style="stop-color:#b8966e" />
    </linearGradient>
  </defs>

  <!-- === ICON (horizontal, compact) === -->
  <!-- Roof silhouette -->
  <polyline points="10,42 28,22 46,42" fill="none" stroke="#e8f0ea" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="6,42" x2="6" y1="42" y2="42" stroke="#e8f0ea" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Eave extensions -->
  <line x1="5" y1="42" x2="12" y2="42" stroke="#e8f0ea" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="44" y1="42" x2="51" y2="42" stroke="#e8f0ea" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Window -->
  <rect x="23" y="30" width="10" height="10" fill="none" stroke="#e8f0ea" stroke-width="1.4" rx="0.5"/>
  <line x1="28" y1="30" x2="28" y2="40" stroke="#e8f0ea" stroke-width="1"/>
  <line x1="23" y1="35" x2="33" y2="35" stroke="#e8f0ea" stroke-width="1"/>

  <!-- Letter N -->
  <line x1="13" y1="42" x2="13" y2="16" stroke="#e8f0ea" stroke-width="2.8" stroke-linecap="square"/>
  <line x1="13" y1="16" x2="43" y2="42" stroke="#e8f0ea" stroke-width="2.2" stroke-linecap="square"/>
  <line x1="43" y1="42" x2="43" y2="16" stroke="#e8f0ea" stroke-width="2.8" stroke-linecap="square"/>

  <!-- Star -->
  <path d="M52,13 L54,19 L60,21 L54,23 L52,29 L50,23 L44,21 L50,19 Z" fill="url(#starGold)" opacity="0.85"/>
  <path d="M64,10 L65.5,14 L70,15.5 L65.5,17 L64,21 L62.5,17 L58,15.5 L62.5,14 Z" fill="url(#starGold)" opacity="0.55"/>

  <!-- Divider line -->
  <line x1="78" y1="14" x2="78" y2="46" stroke="#c9a265" stroke-width="0.8" opacity="0.5"/>

  <!-- === WORDMARK (right of icon) === -->
  <!-- NOVALUXE -->
  <text
    x="92"
    y="34"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="normal"
    letter-spacing="5"
    fill="#f0f4f1"
    dominant-baseline="middle"
  >NOVALUXE</text>

  <!-- HOME CLEANING -->
  <text
    x="93"
    y="48"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="8"
    font-weight="normal"
    letter-spacing="3.5"
    fill="#c9a265"
    dominant-baseline="middle"
    opacity="0.9"
  >HOME CLEANING</text>
</svg>
